[DEFAULT]

#
# Global configuration settings
#
OBJECT_TYPE=0
GLOBAL_DEBUGLEVEL= -DDEBUG_LEVEL=5

GLOBAL_COMPILEFLAGS= -Wall

OPTION_FLAGS = -DOBJECT_TYPE=%(OBJECT_TYPE)s
GLOBAL_BUILDFLAGS= %(GLOBAL_COMPILEFLAGS)s %(GLOBAL_DEBUGLEVEL)s %(OPTION_FLAGS)s

#
# Tunable variables — override per env via build_flags (or on the command line
# with: pio run -e <env> -- --build-flag=-DVAR=value)
#
#   -DIRQ_PIN=N          Pin connected to MPR121 IRQ output (interrupt-capable)
#                        AVR typical: 2 or 3.  ESP32 typical: 4.
#   -DDEBUG_LED=N        LED pin for touch-state indication.
#                        Default: 13 (most AVR boards). ESP32 dev boards: 2.
#   -DI2C_ADDRESS=0xNN   MPR121 I2C address 0x5A–0x5D depending on ADDR pin.
#                        Default: 0x5A (ADDR tied to GND).
#   -DSERIAL_BAUD=N      Serial output baud rate.
#                        Default: 9600. Use 115200 for ESP32 or fast logging.
#   -DTOUCH_TRIGGER=N    Touch detection threshold (0–15). Default: 15.
#   -DTOUCH_RELEASE=N    Release detection threshold (0–15). Default: 2.

[platformio]
lib_dir = /Users/amp/Dropbox/Arduino/libraries
src_dir = ../../MPR121/examples/MPR121BasicUse

[env:moteino]
platform = atmelavr
framework = arduino
board = moteinomega
build_flags = %(GLOBAL_BUILDFLAGS)s -DIRQ_PIN=2

[env:uno]
platform = atmelavr
framework = arduino
board = uno
build_flags = %(GLOBAL_BUILDFLAGS)s -DIRQ_PIN=2

[env:nano]
platform = atmelavr
framework = arduino
board = nanoatmega328
build_flags = %(GLOBAL_BUILDFLAGS)s -DIRQ_PIN=3

[env:nano_prototype] # This uses a standard HMTL pixel board
platform = atmelavr
framework = arduino
board = nanoatmega328
build_flags = %(GLOBAL_BUILDFLAGS)s -DDISABLE_XBEE -DPIXELS_WS2812B_12

[env:32u4]
platform = atmelavr
framework = arduino
board = sparkfun_promicro16
build_flags = %(GLOBAL_BUILDFLAGS)s -DDISABLE_XBEE -DPIXELS_WS2812B_10 -DDISABLE_MPR121
upload_port = /dev/cu.usbmodem1411

[env:esp32dev]
platform = espressif32
framework = arduino
board = esp32dev
; ESP32 default I2C: SDA=GPIO21, SCL=GPIO22 (Wire.begin() auto-selects these)
build_flags = %(GLOBAL_BUILDFLAGS)s -DIRQ_PIN=4 -DDEBUG_LED=2 -DSERIAL_BAUD=115200
